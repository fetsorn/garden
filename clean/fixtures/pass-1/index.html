<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fetsorn's garden</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <main>
      <h1>fetsorn's garden</h1>
      <button id="random-scene">wander</button>
    </main>
    <script>
      const places = [
        "./english-lessons.html",
        "./legal.html",
        "./crossroads.html",
        "./wanwei.html",
        "./cat.html",
      ];
      document.getElementById("random-scene").addEventListener("click", () => {
        window.location.href =
          places[Math.floor(Math.random() * places.length)];
      });
    </script>
  </body>
</html>
