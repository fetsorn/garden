<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Background -->
  <rect width="400" height="500" fill="#e8f4f8"/>

  <!-- Person - Body -->
  <path d="M 130 450 L 130 360 Q 130 340 150 330 L 150 310 Q 150 290 200 290 Q 250 290 250 310 L 250 330 Q 270 340 270 360 L 270 450 Z" fill="#6b5b95"/>

  <!-- Shirt -->
  <path d="M 170 310 L 200 335 L 230 310" fill="#4a90a4"/>

  <!-- Neck -->
  <rect x="185" y="285" width="30" height="30" fill="#fdbcb4"/>

  <!-- Head -->
  <ellipse cx="200" cy="235" rx="50" ry="60" fill="#fdbcb4"/>

  <!-- Hair (long, dark) -->
  <path d="M 150 220 Q 145 160 200 155 Q 255 160 250 220 Q 252 260 245 280 L 240 320 Q 200 325 160 320 L 155 280 Q 148 260 150 220" fill="#2c1810"/>
  <path d="M 150 220 Q 140 240 145 280" fill="none" stroke="#2c1810" stroke-width="12" stroke-linecap="round"/>

  <!-- Bangs -->
  <path d="M 160 180 Q 180 190 200 185 Q 220 180 240 185" fill="none" stroke="#2c1810" stroke-width="8" stroke-linecap="round"/>

  <!-- Eyebrows -->
  <path d="M 175 215 Q 185 210 195 215" fill="none" stroke="#2c1810" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 205 215 Q 215 210 225 215" fill="none" stroke="#2c1810" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="185" cy="230" rx="9" ry="6" fill="#fff"/>
  <ellipse cx="215" cy="230" rx="9" ry="6" fill="#fff"/>
  <circle cx="187" cy="230" r="4" fill="#4a3728"/>
  <circle cx="217" cy="230" r="4" fill="#4a3728"/>

  <!-- Nose -->
  <path d="M 200 235 L 196 255 L 204 255 Z" fill="#e5a59a"/>

  <!-- Mouth (smile) -->
  <path d="M 185 270 Q 200 280 215 270" fill="none" stroke="#c4756a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Glasses -->
  <circle cx="185" cy="230" r="12" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="215" cy="230" r="12" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="197" y1="230" x2="203" y2="230" stroke="#333" stroke-width="2"/>

  <!-- Arms -->
  <path d="M 130 360 Q 110 400 150 420 L 180 420" fill="#fdbcb4"/>
  <path d="M 270 360 Q 290 400 250 420 L 220 420" fill="#fdbcb4"/>

  <!-- Desk -->
  <rect x="50" y="420" width="300" height="80" fill="#8b7355"/>

  <!-- Laptop -->
  <rect x="140" y="370" width="120" height="50" rx="5" fill="#444"/>
  <rect x="145" y="375" width="110" height="40" fill="#1a1a2e"/>
  <rect x="130" y="415" width="140" height="10" fill="#666"/>

  <!-- Code on screen -->
  <text x="150" y="390" fill="#0f0" font-family="monospace" font-size="8">function code() {</text>
  <text x="150" y="400" fill="#0f0" font-family="monospace" font-size="8">  return success;</text>
  <text x="150" y="410" fill="#0f0" font-family="monospace" font-size="8">}</text>

  <!-- Coffee cup -->
  <rect x="280" y="390" width="30" height="35" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <path d="M 310 400 Q 320 400 320 410 Q 320 420 310 420" fill="none" stroke="#fff" stroke-width="3"/>
  <rect x="282" y="392" width="26" height="8" fill="#6f4e37"/>
</svg>
