<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fetsorn's garden</title>
    <link rel="stylesheet" href="./index.css" />
    <script src="lang.js"></script>
  </head>
  <body>
    <main>
      <h1>fetsorn's garden</h1>
      <p lang="en">Helping humans understand each other</p>
      <p lang="ru">Помогаю людям понять друг друга.</p>
      <p lang="zh">帮助人类相互理解</p>
      <button id="random-scene">
        <span lang="en">wander</span>
        <span lang="ru">куда-нибудь</span>
        <span lang="zh">漫步</span>
      </button>
    </main>
    <div class="lang-toggle">
      <button data-lang="en" onclick="setLang('en')">en</button>
      <button data-lang="ru" onclick="setLang('ru')">ru</button>
      <button data-lang="zh" onclick="setLang('zh')">zh</button>
    </div>
    <footer>
      <a href="./all.html">
        <span lang="en">index</span>
        <span lang="ru">карта сайта</span>
        <span lang="zh">地图</span>
      </a>
    </footer>
    <script>
      const places = [
        "./crossroads.html",
        "./wanwei.html",
        "./cat.html",
        "./english-lessons.html",
        "./legal.html",
      ];
      document.getElementById("random-scene").addEventListener("click", () => {
        window.location.href =
          places[Math.floor(Math.random() * places.length)];
      });
    </script>
  </body>
</html>
