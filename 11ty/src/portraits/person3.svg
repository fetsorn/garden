<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Background -->
  <rect width="400" height="500" fill="#f5f5f5"/>
  
  <!-- Fingerprint pattern (subtle detective theme) -->
  <g opacity="0.1" stroke="#666" stroke-width="2" fill="none">
    <ellipse cx="320" cy="100" rx="50" ry="70"/>
    <ellipse cx="320" cy="105" rx="40" ry="55"/>
    <ellipse cx="320" cy="110" rx="30" ry="40"/>
    <ellipse cx="320" cy="115" rx="20" ry="25"/>
  </g>
  
  <!-- Chair back -->
  <rect x="80" y="280" width="60" height="120" rx="5" fill="#444"/>
  
  <!-- Person - Body -->
  <path d="M 120 450 L 120 380 Q 120 360 140 350 L 140 320 Q 140 300 200 300 Q 260 300 260 320 L 260 350 Q 280 360 280 380 L 280 450 Z" fill="#5a7a9a"/>
  
  <!-- Shirt collar -->
  <path d="M 170 320 L 200 340 L 230 320" fill="#3a5a7a" stroke="#2a4a6a" stroke-width="2"/>
  
  <!-- Neck -->
  <rect x="180" y="290" width="40" height="35" fill="#d4a574"/>
  
  <!-- Head -->
  <ellipse cx="200" cy="240" rx="55" ry="65" fill="#d4a574"/>
  
  <!-- Hair -->
  <path d="M 145 230 Q 145 180 200 175 Q 255 180 255 230 Q 255 210 245 200 Q 230 185 200 185 Q 170 185 155 200 Q 145 210 145 230" fill="#2c1810"/>
  <path d="M 145 230 Q 150 250 155 260" fill="none" stroke="#2c1810" stroke-width="8" stroke-linecap="round"/>
  <path d="M 255 230 Q 250 250 245 260" fill="none" stroke="#2c1810" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Eyebrows -->
  <path d="M 175 220 Q 185 215 195 220" fill="none" stroke="#2c1810" stroke-width="3" stroke-linecap="round"/>
  <path d="M 205 220 Q 215 215 225 220" fill="none" stroke="#2c1810" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <ellipse cx="185" cy="235" rx="8" ry="5" fill="#fff"/>
  <ellipse cx="215" cy="235" rx="8" ry="5" fill="#fff"/>
  <circle cx="187" cy="235" r="3" fill="#4a3728"/>
  <circle cx="217" cy="235" r="3" fill="#4a3728"/>
  
  <!-- Nose -->
  <path d="M 200 240 L 195 260 L 205 260 Z" fill="#c4956a"/>
  
  <!-- Mouth -->
  <path d="M 185 275 Q 200 280 215 275" fill="none" stroke="#8b6f5a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Stubble/shadow -->
  <path d="M 170 265 Q 200 285 230 265" fill="none" stroke="#8b7355" stroke-width="2" opacity="0.5"/>
  
  <!-- Arms on desk -->
  <path d="M 120 380 Q 100 420 140 430 L 180 430" fill="#d4a574" stroke="#5a7a9a" stroke-width="2"/>
  <path d="M 280 380 Q 300 420 260 430 L 220 430" fill="#d4a574" stroke="#5a7a9a" stroke-width="2"/>
  
  <!-- Desk -->
  <rect x="50" y="430" width="300" height="70" fill="#8b7355"/>
  <rect x="50" y="425" width="300" height="10" fill="#a08060"/>
  
  <!-- Laptop -->
  <rect x="130" y="390" width="140" height="40" rx="3" fill="#333"/>
  <rect x="135" y="395" width="130" height="30" fill="#1a1a2e"/>
  <rect x="120" y="425" width="160" height="8" fill="#555"/>
  
  <!-- Magnifying glass -->
  <circle cx="310" cy="410" r="25" fill="none" stroke="#8b7355" stroke-width="4"/>
  <circle cx="310" cy="410" r="22" fill="rgba(200,230,255,0.3)"/>
  <line x1="328" y1="428" x2="350" y2="450" stroke="#8b7355" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Code brackets on laptop screen -->
  <text x="145" y="415" fill="#0f0" font-family="monospace" font-size="12">&lt;/&gt;</text>
  
  <!-- Investigation notes -->
  <rect x="260" y="380" width="50" height="35" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <line x1="265" y1="390" x2="305" y2="390" stroke="#666" stroke-width="1"/>
  <line x1="265" y1="397" x2="300" y2="397" stroke="#666" stroke-width="1"/>
  <line x1="265" y1="404" x2="295" y2="404" stroke="#666" stroke-width="1"/>
  
  <!-- Watch -->
  <rect x="250" y="415" width="20" height="12" rx="2" fill="#333"/>
  <rect x="248" y="418" width="2" height="6" fill="#666"/>
  <rect x="270" y="418" width="2" height="6" fill="#666"/>
</svg>
