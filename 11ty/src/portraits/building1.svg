<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a4a6a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="500" fill="url(#skyGradient)"/>
  
  <!-- Moon -->
  <circle cx="350" cy="80" r="30" fill="#f5f5dc" opacity="0.9"/>
  
  <!-- Stars -->
  <circle cx="50" cy="50" r="2" fill="#fff"/>
  <circle cx="100" cy="100" r="1.5" fill="#fff"/>
  <circle cx="200" cy="60" r="2" fill="#fff"/>
  <circle cx="300" cy="120" r="1.5" fill="#fff"/>
  <circle cx="80" cy="150" r="1" fill="#fff"/>
  <circle cx="250" cy="90" r="2" fill="#fff"/>
  
  <!-- Back buildings -->
  <rect x="20" y="250" width="80" height="250" fill="#2a2a4a"/>
  <rect x="300" y="280" width="70" height="220" fill="#2a2a4a"/>
  <rect x="350" y="320" width="50" height="180" fill="#2a2a4a"/>
  
  <!-- Main skyscraper -->
  <rect x="120" y="50" width="160" height="450" fill="#3a4a6a"/>
  
  <!-- Building top -->
  <rect x="130" y="30" width="140" height="20" fill="#4a5a7a"/>
  <polygon points="130,30 200,10 270,30" fill="#4a5a7a"/>
  
  <!-- Windows grid -->
  <!-- Left side windows -->
  <g fill="#ffd700" opacity="0.8">
    <rect x="135" y="70" width="15" height="20"/>
    <rect x="135" y="110" width="15" height="20"/>
    <rect x="135" y="150" width="15" height="20"/>
    <rect x="135" y="190" width="15" height="20"/>
    <rect x="135" y="230" width="15" height="20"/>
    <rect x="135" y="270" width="15" height="20"/>
    <rect x="135" y="310" width="15" height="20"/>
    <rect x="135" y="350" width="15" height="20"/>
    <rect x="135" y="390" width="15" height="20"/>
    <rect x="135" y="430" width="15" height="20"/>
  </g>
  
  <!-- Center windows -->
  <g fill="#ffd700" opacity="0.8">
    <rect x="190" y="70" width="20" height="20"/>
    <rect x="190" y="110" width="20" height="20"/>
    <rect x="190" y="150" width="20" height="20"/>
    <rect x="190" y="190" width="20" height="20"/>
    <rect x="190" y="230" width="20" height="20"/>
    <rect x="190" y="270" width="20" height="20"/>
    <rect x="190" y="310" width="20" height="20"/>
    <rect x="190" y="350" width="20" height="20"/>
    <rect x="190" y="390" width="20" height="20"/>
    <rect x="190" y="430" width="20" height="20"/>
  </g>
  
  <!-- Right side windows -->
  <g fill="#ffd700" opacity="0.8">
    <rect x="250" y="70" width="15" height="20"/>
    <rect x="250" y="110" width="15" height="20"/>
    <rect x="250" y="150" width="15" height="20"/>
    <rect x="250" y="190" width="15" height="20"/>
    <rect x="250" y="230" width="15" height="20"/>
    <rect x="250" y="270" width="15" height="20"/>
    <rect x="250" y="310" width="15" height="20"/>
    <rect x="250" y="350" width="15" height="20"/>
    <rect x="250" y="390" width="15" height="20"/>
    <rect x="250" y="430" width="15" height="20"/>
  </g>
  
  <!-- Some dark windows -->
  <g fill="#1a1a2e">
    <rect x="135" y="130" width="15" height="20"/>
    <rect x="190" y="170" width="20" height="20"/>
    <rect x="250" y="210" width="15" height="20"/>
    <rect x="135" y="290" width="15" height="20"/>
    <rect x="190" y="330" width="20" height="20"/>
  </g>
  
  <!-- Building details -->
  <rect x="120" y="150" width="160" height="3" fill="#5a6a8a"/>
  <rect x="120" y="300" width="160" height="3" fill="#5a6a8a"/>
  
  <!-- Ground -->
  <rect x="0" y="480" width="400" height="20" fill="#1a1a2e"/>
  
  <!-- Street lights -->
  <rect x="80" y="450" width="5" height="30" fill="#666"/>
  <circle cx="82.5" cy="445" r="5" fill="#ffd700" opacity="0.7"/>
  
  <rect x="315" y="450" width="5" height="30" fill="#666"/>
  <circle cx="317.5" cy="445" r="5" fill="#ffd700" opacity="0.7"/>
</svg>
